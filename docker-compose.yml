services:
  mongo:
    image: mongo:7
    container_name: remote-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  back:
    build: ./back-rs
    container_name: remote-back
    restart: unless-stopped
    environment:
      PORT: 5000
      MONGO_URL: mongodb://mongo:27017/remote
      JWT_SECRET: super-secret-dev
      JWT_EXPIRES_IN: 7d
      SOUNDCLOUD_CLIENT_ID: ${SOUNDCLOUD_CLIENT_ID:-EnTrn2ZjaZXfOU7iRsFicZvTOi1Pl3rK}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
    ports:
      - "5000:5000"
    depends_on:
      - mongo
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:5000/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  front:
    build: ./front
    container_name: remote-front
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:5000/api
      VITE_SOCKET_URL: ws://localhost:5000/ws
    ports:
      - "5173:5173"
    depends_on:
      back:
        condition: service_healthy
    volumes:
      - ./front:/app
      - front_node_modules:/app/node_modules

volumes:
  mongo_data:
  front_node_modules:
